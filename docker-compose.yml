services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: matching
    ports:
      # Host 5433 -> container 5432 (5433 avoids clashing with any local Postgres;
      # the app connects over the compose network on db:5432 regardless).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      # Override to reach Postgres over the compose network (not localhost).
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/matching
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
